name: Release

# Per-app release. Tag format: <app>-v<semver>, e.g. blog-v0.3.0
on:
  push:
    tags:
      - '*-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      prerelease: ${{ steps.t.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: t
        run: |
          REF="${{ github.ref_name }}"          # e.g. blog-v0.3.0
          APP="${REF%-v*}"                       # blog
          VERSION="${REF#$APP-}"                 # v0.3.0, or v1.2.3-rc.1
          echo "app=$APP"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate app name
        run: |
          case "${{ steps.t.outputs.app }}" in
            blog|home|photos|rtk) ;;
            *)
              echo "::error::Invalid app name '${{ steps.t.outputs.app }}' parsed from tag '${{ github.ref_name }}'. Expected one of: blog, home, photos, rtk."
              exit 1
              ;;
          esac

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/wamphlett-${{ steps.t.outputs.app }}
          docker build \
            --build-arg VERSION=${{ steps.t.outputs.version }} \
            -f apps/${{ steps.t.outputs.app }}/Dockerfile \
            -t $IMAGE:${{ steps.t.outputs.version }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ steps.t.outputs.version }}
          docker push $IMAGE:latest

  update-lab:
    needs: release
    if: needs.release.outputs.prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out lab
        uses: actions/checkout@v4
        with:
          repository: wamphlett/lab
          token: ${{ secrets.LAB_REPO_TOKEN }}
      - name: Bump versions.json
        run: |
          REF="${{ github.ref_name }}"
          APP="${REF%-v*}"
          VERSION="${REF#$APP-}"
          IMAGE=ghcr.io/${{ github.repository_owner }}/wamphlett-$APP
          jq --arg k "$IMAGE" --arg v "$VERSION" '.[$k] = $v' \
            tanka/versions.json > tmp && mv tmp tanka/versions.json
          git config user.name "release-bot"
          git config user.email "bot@wamphlett.net"
          git commit -am "build: $IMAGE $VERSION"
          git pull --rebase && git push
